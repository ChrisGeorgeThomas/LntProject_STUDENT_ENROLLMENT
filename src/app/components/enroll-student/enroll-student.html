<div class="enroll-container">
  <h2>Enroll Student in Course</h2>
  <div class="enrollment-form-wrapper">
    <form [formGroup]="enrollmentForm" (ngSubmit)="submitEnrollment()" class="enrollment-form">
      <div class="form-group">
        <label for="studentSelect">Select Student:</label>
        <select
          id="studentSelect"
          formControlName="studentId"
          class="form-control"
        >
          <option value="">-- Select a Student --</option>
          <option *ngFor="let student of students" [value]="student.id">
            {{ student.name }} ({{ student.email }})
          </option>
        </select>
        <span
          *ngIf="enrollmentForm.get('studentId')?.invalid && enrollmentForm.get('studentId')?.touched"
          class="error-message"
        >
          Please select a student
        </span>
      </div>

      <div class="form-group">
        <label for="courseSelect">Select Course:</label>
        <select
          id="courseSelect"
          formControlName="courseId"
          class="form-control"
        >
          <option value="">-- Select a Course --</option>
          <option
            *ngFor="let course of courses"
            [value]="course.id"
            [disabled]="course.isFullyEnrolled"
          >
            {{ course.name }} ({{ course.availableSeats }} seats)
            {{ course.isFullyEnrolled ? '- FULL' : '' }}
          </option>
        </select>
        <span
          *ngIf="enrollmentForm.get('courseId')?.invalid && enrollmentForm.get('courseId')?.touched"
          class="error-message"
        >
          Please select a course
        </span>
      </div>

      <button type="submit" class="btn btn-primary">Enroll Student</button>
    </form>
  </div>

  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-error">
    {{ errorMessage }}
  </div>
</div>
